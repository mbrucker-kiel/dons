{% extends "base.html" %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white border border-stone-200 rounded-2xl p-6">
        <h1 class="text-2xl font-semibold">Admin Login</h1>
        {% if error %}
            <p class="mt-3 text-sm rounded-lg bg-red-100 text-red-700 px-3 py-2">{{ error }}</p>
        {% endif %}
        <form method="post" class="mt-5 space-y-4">
            {{ form.hidden_tag() }}
            <div>
                <label class="text-sm">{{ form.password.label }}</label>
                {{ form.password(class_='mt-1 w-full border rounded-lg px-3 py-2', type='password') }}
            </div>
            {{ form.submit(class_='bg-coffee text-white px-5 py-2 rounded-lg') }}
        </form>
    </div>
</section>
{% endblock %}
