{% extends "base.html" %}

{% block content %}
<section class="max-w-6xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-semibold text-coffee">Speisekarte</h1>
    <p class="text-stone-600 mt-2">Unsere aktuelle Auswahl – regelmäßig aktualisiert.</p>

    <div class="mt-6 grid md:grid-cols-2 gap-4">
        <img src="{{ url_for('static', filename='images/bagelSet.jpg') }}" alt="Bagel-Auswahl" class="h-56 w-full object-cover rounded-2xl border border-stone-200">
        <img src="{{ url_for('static', filename='images/zimtschnecken.jpg') }}" alt="Zimtschnecken" class="h-56 w-full object-cover rounded-2xl border border-stone-200">
    </div>

    <div class="mt-10 space-y-10">
        {% for category in menu_data.categories %}
            <section>
                <h2 class="text-2xl font-semibold mb-4">{{ category.title }}</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    {% for item in category["items"] %}
                        {% include "components/menu_item.html" %}
                    {% endfor %}
                </div>
            </section>
        {% endfor %}
    </div>
</section>
{% endblock %}
