services:
  dons:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # YAML data files (business info, menu) — editable on host
      - ./data:/app/data
      # SQLite database — persisted in a named Docker volume
      - dons_instance:/app/instance

volumes:
  dons_instance:
